<!Doctype html>
	<html>
	<head> <title>  </title> 
			<meta charset="UTF-8">
				<meta name="description" content="This is a Registration Form Homepage.">
					<meta name="author" content="Vaishnavi Didewar">
				<meta name="viewport" content="width=device-width, initial-scale=1.0">
			<meta http-equiv="refresh" content="13">
	</head>
	<body>
		<fieldset style="height:1050px; width:750px; margin:0% 0% 0% 14%; background:linear-gradient(to bottom, #33ccff 0%, #ff99cc 65%); border-collapse:collapse; border:4px solid black;
		border-style:dashed;">
				<legend style="margin:auto; font-weight:bold;">
						Registration Form
				</legend>
				<form method="Post">
										<label style=" font-weight:bold;">
										First Name 
										</label>
										<input type="text" placeholder="Your Name"  required style="height:15px; width:300px; text-align:center; margin:0% 3% 0% 16%;">
										<b> ( Max 50 Characters Allowed )</b>
								<label style=" font-weight:bold; ">
								Last Name 
								</label>
								<input type="text" placeholder="Your Name"  required style="height:15px; width:300px; text-align:center; margin:3% 3% 0% 16.5%;">
								<b> ( Max 50 Characters Allowed )</b>
											<label style=" font-weight:bold; ">
											Email ID
											</label>
											<input type="email" placeholder="Your Email" name="email" required style="height:15px; text-align:center; width:300px; margin:3% 26% 0% 18%;">
								<label style=" font-weight:bold; margin:0% 0% 3% 0%;">
								Mobile Number
								</label>
								<input type="number" placeholder="Your Contact" name="Phone"  required  style="height:15px; width:300px; text-align:center; text-align:center; margin:3% 3% 3% 12%;">
								<b style="padding:0% 10% 3% 0%;"> ( 10 Digits Allowed )</b>
											<div><label style=" font-weight:bold;   padding:3% 19.5% 0% 0%;">
											Gender
											</label>
											<input type="radio"  name="options" value="option1" required  >
											<label style=" font-weight:bold;  padding:0% 0% 0% 0%;">
											Male
											</label>
											<input type="radio"  name="options" value="option2"  required >
											<label style=" font-weight:bold;  padding:0% 50% 0% 0%;">
											Female
											</label></div>
								<label style=" font-weight:bold;  padding:3% 0% 0% 0%;">
								Date Of Birth (DOB)
								</label>
								<input type="date"  name="dob" style="margin:3% 55% 0% 7.4%;"   required >
											<label style=" font-weight:bold;  padding:3% 0% 0% 0%;">
											Time Of Birth
											</label>
											<input type="time"  name="time" style="margin:3% 0% 0% 13.7%;"   required >
								<div style="margin:3% 0% 0% 0%;"><label style="font-weight:bold; padding:3% 0% 0% 0%; ">
								Address
								</label>
								<input type="text" placeholder="Your Address"  required  style="margin:0% 0% 0% 19.4%; height:100px; text-align:center; width:200px; ">
								</div>
											<label style=" font-weight:bold; ">
											City
											</label>
											<input type="text" placeholder="Your City Name"  required style="height:15px; width:300px; text-align:center; margin:3% 3% 0% 22.9%;">
											<b> ( Max 50 Characters Allowed )</b>
								<label style=" font-weight:bold; ">
								Pin Code
								</label>
								<input type="number" placeholder="Your City's Pin Code"  required style="height:15px; width:300px; text-align:center; margin:3% 3% 0% 18.5%;">
								<b> ( Max 6 Numbers Allowed )</b>
											<label style=" font-weight:bold; ">
											State
											</label>
											<input type="text" placeholder="Your State Name"  required style="height:15px; width:300px; text-align:center; margin:3% 3% 0% 22.3%;">
											<b> ( Max 50 Characters Allowed )</b>
								<div required><label style="font-weight:bold; padding:3% 19.2% 0% 0%;">
								Country
								</label>
								<select name="city" style="font-weight:bold; margin:3% 0% 0% 0%;">
								<option value="sambhajinagar">India</option>
								<option value="pune">South Korea</option>
								<option value="mumbai">Thailand</option>
								<option value="Afghanistan">Afghanistan</option>
								<option value="Argentina">Argentina</option>
								<option value="North Korea">North Korea</option>
								<option value="China">China</option>
								<option value="Pakistan">Pakistan</option>
								<option value="Newsland">Newsland</option>
								<option value="Rassia">Rassia</option>
								<option value="United State Of America">United State Of America</option>
								<option value="Bhutan">Bhutan</option>
								<option value="Iraq">Iraq</option>
								<option value="Saudi Arabia">Saudi Arabia</option>
								<option value="Turkey">Turkey</option>
								<option value="Georgia">Georgia</option>
								<option value="Germany">Germany</option>
								<option value="Maldives">Maldives</option>
								<option value="Taiwan">Taiwan</option>
								<option value="Hong Kong">Hong Kong</option>
								<option value="Malta">Malta</option>
								</select></div>
											<div style="font-weight:bold; margin:3% 0% 0% 0%;" required><label style="font-weight:bold; padding:0% 19% 0% 0%;">
											Hobbies
											</label>
											<input type="checkbox"  name="check1"  value="check1" required>
											<label>
											Drawing
											</label>
											<input type="checkbox"  name="check2"  value="check2" required>
											<label>
											Singing
											</label>
											<input type="checkbox"  name="check1"  value="check1" required>
											<label>
											Dancing
											</label>
											<input type="checkbox"  name="check2"  value="check2" required>
											<label>
											Sketching
											</label>
											<input type="checkbox"  name="check1"  value="check1" required>
											<label>
											Painting
											</label>
											<input type="checkbox"  name="check2"  value="check2" required>
											<label>
											Others
											</label>
											</div>
														<div style="font-weight:bold; margin:3% 0% 0% 0%;"><label style="font-weight:bold; padding:0% 14.5% 0% 0%;">
														Qualification
														</label>
														<div  style="padding-left:27%; "required><input type="radio"   name="options" value="option1" required>
														<label>
														High School (10<sup>th</sup>)
														</label></div>
														<div style="padding-left:27%; " required><input type="radio"    value="option2" name="options"  required >
														<label>
														Higher School (12<sup>th</sup>)
														</label></div>
														<div style="padding-left:27%;" required><input type="radio"    value="option3" name="options"  required >
														<label>
														Graduation
														</label></div>
														<div style="padding-left:27%;" required><input type="radio"    value="option4" name="options"  required >
														<label>
														Post Graduation
														</label></div>
														<div style="padding-left:27%;" required><input type="radio"   value="option5"  name="options"  required >
														<label>
														Phd
														</label></div>
														</div>
								<div style="font-weight:bold"><label style="font-weight:bold; margin:6% 0% 0% 0%;">
								Courses <div>Applied For</div>
								</label>
								<div style="padding:0% 0% 0% 27%;" required><input type="radio" value="option1" name="options"  required >
								<label>
								BCA (Bachelor of Computer Application)
								</label></div>
								<div style="padding:0% 0% 0% 27%;"required><input type="radio" value="option2" name="options"  required >
								<label>
								B.Com (Bachelor of Commerce)
								</label></div>
								<div style="padding:0% 0% 0% 27%;" required><input type="radio" value="option3" name="options"  required >
								<label>
								B.Sc (Bachelor of Science)
								</label></div>
								<div style="padding:0% 0% 0% 27%;" required><input type="radio" value="option4" name="options"  required >
								<label>
								BA (Bachelor of Arts)
								</label></div>
								<div style="padding:0% 0% 0% 27%;"required><input type="radio" value="option5" name="options" required>
								<label>
								MCA(Master of Computer Application)
								</label></div>
								<div style="padding:0% 0% 0% 27%;" required><input type="radio" value="option6" name="options" required>
								<label>
								M.Com (Master of Commerce)
								</label></div>
								<div style="padding:0% 0% 0% 27%;" required><input type="radio" value="option7" name="options"  required >
								<label>
								M.Sc (Master of Science)
								</label></div>
								<div style="padding:0% 0% 0% 27%;" required><input type="radio" value="option8" name="options"  required >
								<label>
								MA (Master of Arts)
								</label></div>
								</div>
											
											<input type="submit" value="submit" style="margin:6% 0% 0% 43%;">
								<input type="reset" value="reset" style="margin:6% 0% 0% 2%;">
								
				</form>
		</fieldset>
	</body>
	</html>
